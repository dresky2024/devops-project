version: '3.8'

services:
  my-website:
    build: .
    ports:
      - "8085:80"
    restart: always 	
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user        # Логин
      POSTGRES_PASSWORD: password # Пароль
      POSTGRES_DB: mydb          # Имя базы
    volumes:
      - db_data:/var/lib/postgresql/data # Данные не пропадут при удалении контейнера

volumes:
  db_data: # Объявляем том для хранения данных
